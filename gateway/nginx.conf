upstream auth        { server auth:3001; }
upstream station     { server station:3002; }
upstream library     { server library:3003; }
upstream scheduler   { server scheduler:3004; }
upstream playlist    { server playlist:3005; }
upstream analytics   { server analytics:3006; }
upstream dj          { server dj:3007; }

# Use Docker's internal DNS so upstream hosts are resolved at request-time,
# not at nginx startup (avoids "host not found" when frontend starts after gateway).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # ─── CORS headers (dev: allow frontend on any localhost port) ─
    set $cors_origin "";
    if ($http_origin ~* "^https?://localhost(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ─── Auth routes ─────────────────────────────────────────────
    location /api/v1/auth/ {
        proxy_pass http://auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Company & User & Role routes ────────────────────────────
    location ~ ^/api/v1/(companies|users|roles) {
        proxy_pass http://station;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Scheduler: cron + rotation-rules config ─────────────────
    location ~ ^/api/v1/stations/[^/]+/(config|cron|rotation-rules) {
        proxy_pass http://scheduler;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Scheduler: playlist generation ─────────────────────────
    location ~ ^/api/v1/stations/[^/]+/playlists/generate {
        proxy_pass http://scheduler;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Analytics: heatmap + over/underplayed ───────────────────
    location ~ ^/api/v1/stations/[^/]+/analytics {
        proxy_pass http://analytics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Library: songs + categories ────────────────────────────
    location ~ ^/api/v1/stations/[^/]+/(songs|categories) {
        proxy_pass http://library;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Library: templates (per-station) ────────────────────────
    location ~ ^/api/v1/stations/[^/]+/templates {
        proxy_pass http://library;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Scheduler: station-level jobs list ──────────────────────
    location ~ ^/api/v1/stations/[^/]+/jobs {
        proxy_pass http://scheduler;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Scheduler: generation failures ──────────────────────────
    location ~ ^/api/v1/stations/[^/]+/generation-failures {
        proxy_pass http://scheduler;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Playlist: station playlists list ────────────────────────
    location ~ ^/api/v1/stations/[^/]+/playlists {
        proxy_pass http://playlist;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Station: catch-all for remaining station routes ─────────
    location ~ ^/api/v1/stations {
        proxy_pass http://station;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Resource-level routes ────────────────────────────────────
    location ~ ^/api/v1/(songs|categories)/ {
        proxy_pass http://library;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Library: template resource routes ───────────────────────
    location ~ ^/api/v1/templates/ {
        proxy_pass http://library;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Scheduler: job resource routes ──────────────────────────
    location ~ ^/api/v1/jobs/ {
        proxy_pass http://scheduler;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Playlist: playlist + entry resource routes ───────────────
    location ~ ^/api/v1/playlists/ {
        proxy_pass http://playlist;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Analytics: per-song history ─────────────────────────────
    location ~ ^/api/v1/songs/[^/]+/history {
        proxy_pass http://analytics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Analytics: dashboard stats ──────────────────────────────
    location ~ ^/api/v1/dashboard/ {
        proxy_pass http://analytics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── DJ service: adlib clip uploads (large body limit for audio files) ───
    location ~ ^/api/v1/dj/adlib-clips {
        client_max_body_size 55m;
        proxy_pass http://dj;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── DJ service: profiles, dayparts, script templates, scripts ──
    location ~ ^/api/v1/dj/ {
        proxy_pass http://dj;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Health check ─────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ─── Frontend (catch-all) ──────────────────────────────────────
    # set $fe_upstream defers DNS resolution until request-time (resolver above).
    location / {
        set $fe_upstream http://frontend:3000;
        proxy_pass $fe_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js HMR / future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
