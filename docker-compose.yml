version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ─── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-playgen}
      POSTGRES_USER: ${POSTGRES_USER:-playgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-playgen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Migration runner (runs once, then exits) ───────────────
  migrate:
    build:
      context: .
      dockerfile: shared/db/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "dist/migrate.js"]
    restart: "no"

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GATEWAY_URL: http://gateway
    environment:
      GATEWAY_URL: http://gateway
      NODE_ENV: production
    restart: unless-stopped

  # ─── API Gateway ────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "80:80"
    environment:
      # Docker Compose internal hostnames — override on Railway with *.railway.internal
      AUTH_HOST:      auth
      STATION_HOST:   station
      LIBRARY_HOST:   library
      SCHEDULER_HOST: scheduler
      PLAYLIST_HOST:  playlist
      ANALYTICS_HOST: analytics
      DJ_HOST:        dj
      FRONTEND_HOST:  frontend
      DNS_RESOLVER:   "127.0.0.11"
      ALLOWED_ORIGIN: ""
    depends_on:
      - auth
      - station
      - library
      - scheduler
      - playlist
      - analytics
      - dj

  # ─── Services ───────────────────────────────────────────────
  auth:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${AUTH_SERVICE_PORT:-3001}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  station:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/station/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${STATION_SERVICE_PORT:-3002}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  library:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/library/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${LIBRARY_SERVICE_PORT:-3003}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${SCHEDULER_SERVICE_PORT:-3004}
      # Auto-pipeline: internal service-to-service auth for DJ + info-broker triggers
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DJ_INTERNAL_URL: http://dj:3007
      AUTH_INTERNAL_URL: http://auth:3001
      INFO_BROKER_URL: ${INFO_BROKER_BASE_URL}
      INFO_BROKER_API_KEY: ${INFO_BROKER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  playlist:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/playlist/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${PLAYLIST_SERVICE_PORT:-3005}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${ANALYTICS_SERVICE_PORT:-3006}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  ownradio-api:
    build:
      context: ../ownradio
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${OWNRADIO_DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PLAYGEN_WEBHOOK_SECRET: ${PLAYGEN_WEBHOOK_SECRET:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  dj:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/dj/Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${DJ_SERVICE_PORT:-3007}
      STORAGE_LOCAL_PATH: /app/data/audio
      # LLM backend: claude-code uses the claude-code sidecar container (subscription)
      # Switch to openrouter for production: LLM_BACKEND=openrouter
      LLM_BACKEND: ${LLM_BACKEND:-claude-code}
      CLAUDE_RELAY_URL: http://claude-code:3099
      # LLM for DJ script generation (used when LLM_BACKEND=openrouter)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      # TTS storage (S3/R2 for CDN-backed HLS)
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-auto}
      S3_PREFIX: ${S3_PREFIX}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # Info-broker for weather/news/jokes
      INFO_BROKER_BASE_URL: ${INFO_BROKER_BASE_URL}
      INFO_BROKER_API_KEY: ${INFO_BROKER_API_KEY}
      # Auto-pipeline: publish trigger after TTS
      STATION_INTERNAL_URL: http://station:3002
      AUTH_INTERNAL_URL: http://auth:3001
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PROD_GATEWAY_URL: ${PROD_GATEWAY_URL}
      # OwnRadio webhook
      OWNRADIO_WEBHOOK_URL: ${OWNRADIO_WEBHOOK_URL}
      PLAYGEN_WEBHOOK_SECRET: ${PLAYGEN_WEBHOOK_SECRET}
    volumes:
      - dj_audio_data:/app/data/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      claude-code:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Claude Code LLM service ─────────────────────────────────────────────────
  # Runs the `claude` CLI inside Docker and exposes an HTTP relay on :3099.
  # The DJ service calls this to generate scripts using your Claude subscription.
  #
  # First-time login (run once after `docker compose up`):
  #   docker compose exec -it claude-code claude
  #   → follow the browser login flow, then Ctrl+C back to the relay
  claude-code:
    build:
      context: services/claude-code
      dockerfile: Dockerfile
    environment:
      PORT: 3099
    volumes:
      - claude_auth:/root/.claude   # persists login across restarts
    networks:
      - playgen
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  dj_audio_data:
  claude_auth:
