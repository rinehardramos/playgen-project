version: 2
updates:
  # Root monorepo devDependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  # Frontend (Next.js)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # Auth service
  - package-ecosystem: "npm"
    directory: "/services/auth"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"

  # DJ service
  - package-ecosystem: "npm"
    directory: "/services/dj"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"

  # Station service
  - package-ecosystem: "npm"
    directory: "/services/station"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"

  # Scheduler service
  - package-ecosystem: "npm"
    directory: "/services/scheduler"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"

  # Library service
  - package-ecosystem: "npm"
    directory: "/services/library"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"

  # Playlist service
  - package-ecosystem: "npm"
    directory: "/services/playlist"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"

  # Analytics service
  - package-ecosystem: "npm"
    directory: "/services/analytics"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
      - "security"
    groups:
      actions:
        patterns: ["*"]

  # Python tools (knowledge-base / task-daemon / agent-ops / tg-agent)
  - package-ecosystem: "pip"
    directory: "/tools/knowledge-base"
    schedule: { interval: "weekly", day: "monday" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "python", "security"]
  - package-ecosystem: "pip"
    directory: "/tools/task-daemon"
    schedule: { interval: "weekly", day: "monday" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "python", "security"]
  - package-ecosystem: "pip"
    directory: "/tools/agent-ops"
    schedule: { interval: "weekly", day: "monday" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "python", "security"]
  - package-ecosystem: "pip"
    directory: "/tools/tg-agent"
    schedule: { interval: "weekly", day: "monday" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "python", "security"]

  # Docker base images (one entry per Dockerfile-bearing dir)
  - package-ecosystem: "docker"
    directory: "/services/auth"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/services/station"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/services/library"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/services/scheduler"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/services/playlist"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/services/analytics"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/services/dj"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/gateway"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/shared/db"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "docker", "security"]
