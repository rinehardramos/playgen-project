name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # ── Build & push Docker images to GHCR ─────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            dockerfile: services/auth/Dockerfile
            context: .
          - service: station
            dockerfile: services/station/Dockerfile
            context: .
          - service: library
            dockerfile: services/library/Dockerfile
            context: .
          - service: scheduler
            dockerfile: services/scheduler/Dockerfile
            context: .
          - service: playlist
            dockerfile: services/playlist/Dockerfile
            context: .
          - service: analytics
            dockerfile: services/analytics/Dockerfile
            context: .
          - service: dj
            dockerfile: services/dj/Dockerfile
            context: .
          - service: gateway
            dockerfile: gateway/Dockerfile
            context: .
          - service: migrate
            dockerfile: shared/db/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Run DB migrations against Supabase ─────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @playgen/db build
      - run: cp -r shared/db/src/migrations shared/db/dist/migrations
      - run: node shared/db/dist/migrate.js
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

  # ── Deploy frontend to Vercel ──────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy backend services to Railway ─────────────────────────
  deploy-services:
    name: Deploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    strategy:
      max-parallel: 3
      matrix:
        service: [auth, station, library, scheduler, playlist, analytics, dj, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ matrix.service }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Post-deploy smoke tests ────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployments to stabilize
        run: sleep 30

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh
        env:
          GATEWAY_URL: ${{ vars.PRODUCTION_GATEWAY_URL }}
          FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
