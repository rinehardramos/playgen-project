name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Build & push Docker images to GHCR ─────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            dockerfile: services/auth/Dockerfile
            context: .
          - service: station
            dockerfile: services/station/Dockerfile
            context: .
          - service: library
            dockerfile: services/library/Dockerfile
            context: .
          - service: scheduler
            dockerfile: services/scheduler/Dockerfile
            context: .
          - service: playlist
            dockerfile: services/playlist/Dockerfile
            context: .
          - service: analytics
            dockerfile: services/analytics/Dockerfile
            context: .
          - service: dj
            dockerfile: services/dj/Dockerfile
            context: .
          - service: gateway
            dockerfile: gateway/Dockerfile
            context: .
          - service: migrate
            dockerfile: shared/db/Dockerfile
            context: .
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Run DB migrations against Supabase ─────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53  # v6.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @playgen/db build
      - run: cp -r shared/db/src/migrations shared/db/dist/migrations
      - run: node shared/db/dist/migrate.js
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

  # ── Deploy frontend to Vercel ──────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53  # v6.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 20
          cache: pnpm

      - run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy backend services to Railway ─────────────────────────
  deploy-services:
    name: Deploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    strategy:
      max-parallel: 3
      matrix:
        service: [auth, station, library, scheduler, playlist, analytics, dj, gateway]
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest --prefer-online

      - name: Deploy to Railway
        run: railway up --service ${{ matrix.service }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Post-deploy smoke tests ────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-frontend]
    environment: production
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Wait for deployments to stabilize
        run: sleep 60

      - name: Run smoke tests
        run: bash scripts/smoke-test.sh
        env:
          GATEWAY_URL: ${{ vars.PRODUCTION_GATEWAY_URL }}
          FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
          MAX_RETRIES: "12"
          RETRY_INTERVAL: "15"
