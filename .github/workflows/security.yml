name: Security

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM UTC
  pull_request:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v3

  # dependency-review is disabled: requires Dependency Graph to be enabled in GitHub
  # Settings → Security & Analysis → Dependency graph. Re-enable once that is configured.
  # CVE scanning is covered by Security Audit (pnpm audit) and OWASP Dependency Check below.

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  owasp-audit:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run audit
        run: pnpm audit --audit-level=moderate --json > audit-report.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
