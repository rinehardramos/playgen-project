name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - run: corepack enable && corepack prepare pnpm@9.15.9 --activate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test:unit

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - run: corepack enable && corepack prepare pnpm@9.15.9 --activate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level=high

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          extra_args: --only-verified

  docker-build-verify:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            dockerfile: services/auth/Dockerfile
            context: .
          - service: station
            dockerfile: services/station/Dockerfile
            context: .
          - service: library
            dockerfile: services/library/Dockerfile
            context: .
          - service: scheduler
            dockerfile: services/scheduler/Dockerfile
            context: .
          - service: playlist
            dockerfile: services/playlist/Dockerfile
            context: .
          - service: analytics
            dockerfile: services/analytics/Dockerfile
            context: .
          - service: dj
            dockerfile: services/dj/Dockerfile
            context: .
          - service: gateway
            dockerfile: gateway/Dockerfile
            context: .
          - service: migrate
            dockerfile: shared/db/Dockerfile
            context: .
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit
          disable-file-monitoring: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
