name: Deploy to VPS

on:
  push:
    tags:
      - '[0-9]*'          # triggers on version tags like 1.01, 2.00, etc.
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/playgen

            # Pull latest code
            git fetch --all --tags
            git checkout ${{ github.ref_name }} 2>/dev/null || git pull origin main

            # Write .env from secret (stored as a single multiline secret)
            echo "${{ secrets.PLAYGEN_ENV }}" > .env

            # Build & restart all services (zero-downtime for stateless containers)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              pull --ignore-pull-failures 2>/dev/null || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build --parallel
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Prune old images to reclaim disk space
            docker image prune -f
